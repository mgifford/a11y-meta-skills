fixture_id: image-carousel-no-region
rubric_version: "1.0"
scoring_method: hybrid
hybrid_weights:
  rule_based: 0.7
  llm_judge: 0.3

dimensions:
  - id: must_find
    name: "Must-Find Issues"
    description: "Critical issues a competent reviewer should find"
    weight: 3

  - id: should_find
    name: "Should-Find Issues"
    description: "Major issues a skilled reviewer would find"
    weight: 2

  - id: nice_to_find
    name: "Nice-to-Find Issues"
    description: "Subtle gaps or optimizations"
    weight: 1

  - id: false_positive_trap
    name: "False Positive Avoidance"
    description: "Correctly avoiding flagging non-issues"
    weight: -2

  - id: evidence_quality
    name: "Evidence Quality"
    description: "CRITICAL/MAJOR findings backed by file:line or quotes"
    weight: 1

  - id: format_compliance
    name: "Format Compliance"
    description: "Output matches a11y-critic format contract"
    weight: 1

expected_findings:
  - category: must_find
    count: 4
    items:
      - description: "Missing role='region' on carousel"
        severity: CRITICAL
        wcag: "1.3.1 Info and Relationships"
        evidence_requirement: "file:line reference to container"
        expected_to_find: "90%"

      - description: "Missing aria-label on region"
        severity: MAJOR
        wcag: "2.4.6 Headings and Labels"
        evidence_requirement: "file:line reference to container"
        expected_to_find: "85%"

      - description: "Missing aria-live region"
        severity: CRITICAL
        wcag: "4.1.3 Status Messages"
        evidence_requirement: "file:line reference or explanation of missing announcements"
        expected_to_find: "90%"

      - description: "Missing aria-current on indicator"
        severity: MAJOR
        wcag: "4.1.2 Name, Role, Value"
        evidence_requirement: "file:line reference to indicator buttons"
        expected_to_find: "85%"

  - category: should_find
    count: 0

  - category: nice_to_find
    count: 1
    items:
      - description: "Evaluate alt text quality"
        severity: ENHANCEMENT
        expected_to_find: "40%"

  - category: false_positive_trap
    count: 0

composite_score_formula: |
  score = sum(found_items * weight) / sum(all_positive_weights) * 100

scoring_thresholds:
  excellent: 90-100
  good: 75-89
  adequate: 60-74
  weak: 40-59
  poor: 0-39

expected_reviewer_performance:
  - condition: harsh-critic
    expected_score: 93-100
    reasoning: "Should identify all 4 issues and cite carousel pattern"

  - condition: baseline-zero-shot
    expected_score: 50-70
    reasoning: "May miss role/aria-live or think buttons are sufficient"

  - condition: baseline-few-shot
    expected_score: 65-80
    reasoning: "Few-shot help with pattern-level understanding"

verdict_expectations:
  harsh-critic: REVISE
  baseline-zero-shot: REVISE
  baseline-few-shot: REVISE

notes: |
  This HAS-BUGS fixture tests complex pattern understanding.

  Key test: Does reviewer understand carousel pattern requires region role, live region, and state management?

  Expected findings:
  - Missing role="region" identified as CRITICAL
  - Missing aria-live identified as CRITICAL
  - Missing aria-label identified as MAJOR
  - Missing aria-current identified as MAJOR
