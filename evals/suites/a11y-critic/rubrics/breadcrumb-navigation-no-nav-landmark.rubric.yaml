fixture_id: breadcrumb-navigation-no-nav-landmark
rubric_version: "1.0"
scoring_method: hybrid
hybrid_weights:
  rule_based: 0.7
  llm_judge: 0.3

dimensions:
  - id: must_find
    name: "Must-Find Issues"
    description: "Critical issues a competent reviewer should find"
    weight: 3

  - id: should_find
    name: "Should-Find Issues"
    description: "Major issues a skilled reviewer would find"
    weight: 2

  - id: nice_to_find
    name: "Nice-to-Find Issues"
    description: "Subtle gaps or optimizations"
    weight: 1

  - id: false_positive_trap
    name: "False Positive Avoidance"
    description: "Correctly avoiding flagging non-issues"
    weight: -2

  - id: evidence_quality
    name: "Evidence Quality"
    description: "CRITICAL/MAJOR findings backed by file:line or quotes"
    weight: 1

  - id: format_compliance
    name: "Format Compliance"
    description: "Output matches a11y-critic format contract"
    weight: 1

expected_findings:
  - category: must_find
    count: 2
    items:
      - description: "Missing <nav> landmark"
        severity: CRITICAL
        wcag: "1.3.1 Info and Relationships"
        evidence_requirement: "file:line reference to container div"
        expected_to_find: "90%"

      - description: "Missing aria-label on navigation"
        severity: MAJOR
        wcag: "2.4.6 Headings and Labels"
        evidence_requirement: "file:line reference to nav element"
        expected_to_find: "85%"

  - category: should_find
    count: 0

  - category: nice_to_find
    count: 1
    items:
      - description: "Consider list structure clarity"
        severity: ENHANCEMENT
        expected_to_find: "30%"

  - category: false_positive_trap
    count: 0

composite_score_formula: |
  score = sum(found_items * weight) / sum(all_positive_weights) * 100

scoring_thresholds:
  excellent: 90-100
  good: 75-89
  adequate: 60-74
  weak: 40-59
  poor: 0-39

expected_reviewer_performance:
  - condition: harsh-critic
    expected_score: 92-100
    reasoning: "Should identify missing <nav> as CRITICAL landmark issue"

  - condition: baseline-zero-shot
    expected_score: 60-75
    reasoning: "May focus on aria-current and list semantics, miss landmark"

  - condition: baseline-few-shot
    expected_score: 70-85
    reasoning: "Few-shot example should help with landmark awareness"

verdict_expectations:
  harsh-critic: REVISE
  baseline-zero-shot: REVISE
  baseline-few-shot: REVISE

notes: |
  This HAS-BUGS fixture tests landmark and orientation understanding.

  Key test: Does reviewer understand that <nav> is essential for breadcrumb navigation?

  Expected findings:
  - Missing <nav> identified as CRITICAL
  - Missing aria-label identified as MAJOR
  - Both findings cite specific lines
  - Landmark context explained
