fixture_id: infinite-scroll-no-announcement
rubric_version: "1.0"
scoring_method: hybrid
hybrid_weights:
  rule_based: 0.7
  llm_judge: 0.3

dimensions:
  - id: must_find
    name: "Must-Find Issues"
    description: "Critical issues a competent reviewer should find"
    weight: 3

  - id: should_find
    name: "Should-Find Issues"
    description: "Major issues a skilled reviewer would find"
    weight: 2

  - id: nice_to_find
    name: "Nice-to-Find Issues"
    description: "Subtle gaps or optimizations"
    weight: 1

  - id: false_positive_trap
    name: "False Positive Avoidance"
    description: "Correctly avoiding flagging non-issues"
    weight: -2

  - id: evidence_quality
    name: "Evidence Quality"
    description: "CRITICAL/MAJOR findings backed by file:line or quotes"
    weight: 1

  - id: format_compliance
    name: "Format Compliance"
    description: "Output matches a11y-critic format contract"
    weight: 1

expected_findings:
  - category: must_find
    count: 4
    items:
      - description: "Missing aria-live region"
        severity: CRITICAL
        wcag: "4.1.3 Status Messages"
        evidence_requirement: "file:line reference to container"
        expected_to_find: "90%"

      - description: "No loading state announcement"
        severity: CRITICAL
        wcag: "4.1.3 Status Messages"
        evidence_requirement: "file:line reference to loadMore"
        expected_to_find: "90%"

      - description: "Missing main landmark"
        severity: MAJOR
        wcag: "1.3.1 Info and Relationships"
        evidence_requirement: "file:line reference to container"
        expected_to_find: "85%"

      - description: "Scroll-to-load mechanism not discoverable"
        severity: MAJOR
        wcag: "3.2.1 On Focus"
        evidence_requirement: "explanation of silent behavior"
        expected_to_find: "80%"

  - category: should_find
    count: 0

  - category: nice_to_find
    count: 1
    items:
      - description: "Consider 'Load More' button alternative"
        severity: ENHANCEMENT
        expected_to_find: "35%"

  - category: false_positive_trap
    count: 0

composite_score_formula: |
  score = sum(found_items * weight) / sum(all_positive_weights) * 100

scoring_thresholds:
  excellent: 90-100
  good: 75-89
  adequate: 60-74
  weak: 40-59
  poor: 0-39

expected_reviewer_performance:
  - condition: harsh-critic
    expected_score: 92-100
    reasoning: "Should identify all 4 issues and cite dynamic content pattern"

  - condition: baseline-zero-shot
    expected_score: 50-70
    reasoning: "May miss aria-live requirement or think mechanism alone is sufficient"

  - condition: baseline-few-shot
    expected_score: 65-80
    reasoning: "Few-shot help with aria-live awareness"

verdict_expectations:
  harsh-critic: REVISE
  baseline-zero-shot: REVISE
  baseline-few-shot: REVISE

notes: |
  This HAS-BUGS fixture tests dynamic content and aria-live understanding.

  Key test: Does reviewer understand that dynamic changes require aria-live announcements?

  Expected findings:
  - Missing aria-live identified as CRITICAL
  - No loading state announcement identified as CRITICAL
  - Missing landmark identified as MAJOR
  - Mechanism discoverability identified as MAJOR
  - All findings cite specific lines
