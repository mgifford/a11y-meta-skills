fixture_id: popover-no-focus-management
rubric_version: "1.0"
scoring_method: hybrid
hybrid_weights:
  rule_based: 0.7
  llm_judge: 0.3

dimensions:
  - id: must_find
    name: "Must-Find Issues"
    description: "Critical issues a competent reviewer should find"
    weight: 3

  - id: should_find
    name: "Should-Find Issues"
    description: "Major issues a skilled reviewer would find"
    weight: 2

  - id: nice_to_find
    name: "Nice-to-Find Issues"
    description: "Subtle gaps or optimizations"
    weight: 1

  - id: false_positive_trap
    name: "False Positive Avoidance"
    description: "Correctly avoiding flagging non-issues"
    weight: -2

  - id: evidence_quality
    name: "Evidence Quality"
    description: "CRITICAL/MAJOR findings backed by file:line or quotes"
    weight: 1

  - id: format_compliance
    name: "Format Compliance"
    description: "Output matches a11y-critic format contract"
    weight: 1

expected_findings:
  - category: must_find
    count: 5
    items:
      - description: "Focus not moved to popover"
        severity: CRITICAL
        wcag: "2.4.3 Focus Order"
        evidence_requirement: "file:line reference to openPopover"
        expected_to_find: "95%"

      - description: "Focus not restored to trigger"
        severity: CRITICAL
        wcag: "2.4.3 Focus Order"
        evidence_requirement: "file:line reference to closePopover"
        expected_to_find: "95%"

      - description: "Missing role='dialog'"
        severity: CRITICAL
        wcag: "4.1.2 Name, Role, Value"
        evidence_requirement: "file:line reference to popover div"
        expected_to_find: "95%"

      - description: "Missing aria-modal"
        severity: MAJOR
        wcag: "WAI-ARIA Modal Dialog Pattern"
        evidence_requirement: "file:line reference to popover"
        expected_to_find: "85%"

      - description: "Missing aria-labelledby"
        severity: MAJOR
        wcag: "4.1.2 Name, Role, Value"
        evidence_requirement: "file:line reference to popover"
        expected_to_find: "80%"

  - category: should_find
    count: 0

  - category: nice_to_find
    count: 0

  - category: false_positive_trap
    count: 0

composite_score_formula: |
  score = sum(found_items * weight) / sum(all_positive_weights) * 100

scoring_thresholds:
  excellent: 90-100
  good: 75-89
  adequate: 60-74
  weak: 40-59
  poor: 0-39

expected_reviewer_performance:
  - condition: harsh-critic
    expected_score: 94-100
    reasoning: "Should identify all 5 issues and cite modal dialog pattern"

  - condition: baseline-zero-shot
    expected_score: 50-70
    reasoning: "May miss role/aria-modal or focus management requirements"

  - condition: baseline-few-shot
    expected_score: 65-80
    reasoning: "Few-shot help with modal pattern awareness"

verdict_expectations:
  harsh-critic: REVISE
  baseline-zero-shot: REVISE
  baseline-few-shot: REVISE

notes: |
  This HAS-BUGS fixture tests modal dialog pattern understanding.

  Key test: Does reviewer understand popovers are modal dialogs requiring focus management and role="dialog"?

  Expected findings:
  - Focus movement issues identified as CRITICAL
  - Missing role="dialog" identified as CRITICAL
  - Missing aria-modal identified as MAJOR
  - Missing aria-labelledby identified as MAJOR
  - All findings cite specific lines and modal pattern
