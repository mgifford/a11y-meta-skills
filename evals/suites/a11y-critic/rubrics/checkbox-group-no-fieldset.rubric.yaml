fixture_id: checkbox-group-no-fieldset
rubric_version: "1.0"
scoring_method: hybrid
hybrid_weights:
  rule_based: 0.7
  llm_judge: 0.3

dimensions:
  - id: must_find
    name: "Must-Find Issues"
    description: "Critical issues a competent reviewer should find"
    weight: 3

  - id: should_find
    name: "Should-Find Issues"
    description: "Major issues a skilled reviewer would find"
    weight: 2

  - id: nice_to_find
    name: "Nice-to-Find Issues"
    description: "Subtle gaps or optimizations"
    weight: 1

  - id: false_positive_trap
    name: "False Positive Avoidance"
    description: "Correctly avoiding flagging non-issues"
    weight: -2

  - id: evidence_quality
    name: "Evidence Quality"
    description: "CRITICAL/MAJOR findings backed by file:line or quotes"
    weight: 1

  - id: format_compliance
    name: "Format Compliance"
    description: "Output matches a11y-critic format contract"
    weight: 1

expected_findings:
  - category: must_find
    count: 2
    items:
      - description: "Missing <fieldset> to group related checkboxes"
        severity: CRITICAL
        wcag: "1.3.1 Info and Relationships"
        evidence_requirement: "file:line reference to wrapper div"
        expected_to_find: "95%"

      - description: "Missing <legend> to label the group"
        severity: CRITICAL
        wcag: "1.3.1 Info and Relationships"
        evidence_requirement: "file:line reference to group-label"
        expected_to_find: "95%"

  - category: should_find
    count: 1
    items:
      - description: "Group context lost to screen reader"
        severity: MAJOR
        evidence_requirement: "explanation of semantic relationship issue"
        expected_to_find: "80%"

  - category: nice_to_find
    count: 0

  - category: false_positive_trap
    count: 0

composite_score_formula: |
  score = sum(found_items * weight) / sum(all_positive_weights) * 100

scoring_thresholds:
  excellent: 90-100
  good: 75-89
  adequate: 60-74
  weak: 40-59
  poor: 0-39

expected_reviewer_performance:
  - condition: harsh-critic
    expected_score: 95-100
    reasoning: "Should identify missing fieldset and legend as CRITICAL HTML form pattern issue"

  - condition: baseline-zero-shot
    expected_score: 65-80
    reasoning: "May check for labels (present) and miss fieldset/legend requirement"

  - condition: baseline-few-shot
    expected_score: 75-90
    reasoning: "Few-shot example should help identify fieldset/legend pattern"

verdict_expectations:
  harsh-critic: REVISE
  baseline-zero-shot: REVISE
  baseline-few-shot: REVISE

notes: |
  This HAS-BUGS fixture tests fundamental HTML form pattern knowledge.

  Key test: Does reviewer understand that checkbox groups require <fieldset> and <legend>, not just individual labels?

  Expected findings:
  - Missing <fieldset> identified as CRITICAL
  - Missing <legend> identified as CRITICAL
  - Both findings cite specific lines
  - WCAG 1.3.1 Info and Relationships cited
