fixture_id: tooltip-no-role-no-association
rubric_version: "1.0"
scoring_method: hybrid
hybrid_weights:
  rule_based: 0.7
  llm_judge: 0.3

dimensions:
  - id: must_find
    name: "Must-Find Issues"
    description: "Critical issues a competent reviewer should find"
    weight: 3

  - id: should_find
    name: "Should-Find Issues"
    description: "Major issues a skilled reviewer would find"
    weight: 2

  - id: nice_to_find
    name: "Nice-to-Find Issues"
    description: "Subtle gaps or optimizations"
    weight: 1

  - id: false_positive_trap
    name: "False Positive Avoidance"
    description: "Correctly avoiding flagging non-issues"
    weight: -2

  - id: evidence_quality
    name: "Evidence Quality"
    description: "CRITICAL/MAJOR findings backed by file:line or quotes"
    weight: 1

  - id: format_compliance
    name: "Format Compliance"
    description: "Output matches a11y-critic format contract"
    weight: 1

expected_findings:
  - category: must_find
    count: 3
    items:
      - description: "Tooltip only appears on hover, not on focus"
        severity: CRITICAL
        wcag: "1.4.13 Content on Hover or Focus"
        evidence_requirement: "file:line reference to event handlers"
        expected_to_find: "95%"

      - description: "Missing aria-describedby on trigger button"
        severity: CRITICAL
        wcag: "4.1.2 Name, Role, Value"
        evidence_requirement: "file:line reference to button element"
        expected_to_find: "90%"

      - description: "Tooltip not announced when button is focused"
        severity: MAJOR
        wcag: "4.1.3 Status Messages"
        evidence_requirement: "file:line reference to conditional rendering"
        expected_to_find: "85%"

  - category: should_find
    count: 0

  - category: nice_to_find
    count: 1
    items:
      - description: "Consider aria-label for unclear button text"
        severity: ENHANCEMENT
        expected_to_find: "40%"

  - category: false_positive_trap
    count: 0

composite_score_formula: |
  score = sum(found_items * weight) / sum(all_positive_weights) * 100

scoring_thresholds:
  excellent: 90-100
  good: 75-89
  adequate: 60-74
  weak: 40-59
  poor: 0-39

expected_reviewer_performance:
  - condition: harsh-critic
    expected_score: 95-100
    reasoning: "Should identify all 3 critical/major issues and cite WCAG 1.4.13 and ARIA pattern"

  - condition: baseline-zero-shot
    expected_score: 50-70
    reasoning: "May miss hover-only issue or think role='tooltip' is sufficient"

  - condition: baseline-few-shot
    expected_score: 65-80
    reasoning: "Few-shot example may help with focus requirement awareness"

verdict_expectations:
  harsh-critic: REVISE
  baseline-zero-shot: REVISE
  baseline-few-shot: REVISE

notes: |
  This HAS-BUGS fixture tests multi-perspective accessibility understanding.

  Key test: Does reviewer understand that tooltips must work for BOTH hover AND focus, and be associated with their trigger?

  Expected findings:
  - Hover-only behavior identified as CRITICAL
  - aria-describedby missing identified as CRITICAL
  - Announcement issue identified as MAJOR
  - All findings cite specific lines and WCAG/pattern context
