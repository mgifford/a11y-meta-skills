fixture_id: accordion-no-region-role
rubric_version: "1.0"
scoring_method: hybrid
hybrid_weights:
  rule_based: 0.7
  llm_judge: 0.3

dimensions:
  - id: must_find
    name: "Must-Find Issues"
    description: "Critical issues a competent reviewer should find"
    weight: 3

  - id: should_find
    name: "Should-Find Issues"
    description: "Major issues a skilled reviewer would find"
    weight: 2

  - id: nice_to_find
    name: "Nice-to-Find Issues"
    description: "Subtle gaps or optimizations"
    weight: 1

  - id: false_positive_trap
    name: "False Positive Avoidance"
    description: "Correctly avoiding flagging non-issues"
    weight: -2

  - id: evidence_quality
    name: "Evidence Quality"
    description: "CRITICAL/MAJOR findings backed by file:line or quotes"
    weight: 1

  - id: format_compliance
    name: "Format Compliance"
    description: "Output matches a11y-critic format contract"
    weight: 1

expected_findings:
  - category: must_find
    count: 2
    items:
      - description: "Missing role='region' on accordion panel"
        severity: MAJOR
        wcag: "WAI-ARIA Accordion Pattern"
        evidence_requirement: "file:line reference to accordion-panel div"
        expected_to_find: "90%"

      - description: "Missing aria-labelledby on accordion panel"
        severity: MAJOR
        wcag: "4.1.2 Name, Role, Value"
        evidence_requirement: "file:line reference to accordion-panel"
        expected_to_find: "85%"

  - category: should_find
    count: 1
    items:
      - description: "Consider keeping all panels in DOM with visibility control"
        severity: ENHANCEMENT
        expected_to_find: "50%"

  - category: nice_to_find
    count: 0

  - category: false_positive_trap
    count: 0

composite_score_formula: |
  score = sum(found_items * weight) / sum(all_positive_weights) * 100

scoring_thresholds:
  excellent: 90-100
  good: 75-89
  adequate: 60-74
  weak: 40-59
  poor: 0-39

expected_reviewer_performance:
  - condition: harsh-critic
    expected_score: 90-100
    reasoning: "Should identify both region and labelledby issues and cite accordion pattern"

  - condition: baseline-zero-shot
    expected_score: 60-75
    reasoning: "May identify aria-expanded as correct but miss region semantics"

  - condition: baseline-few-shot
    expected_score: 70-85
    reasoning: "Few-shot example of accordion pattern may help with region identification"

verdict_expectations:
  harsh-critic: REVISE
  baseline-zero-shot: REVISE
  baseline-few-shot: REVISE

notes: |
  This HAS-BUGS fixture tests pattern-level understanding, not just attribute presence.

  Key test: Can reviewer identify that while aria-expanded is correct, the pattern lacks the region semantics for screen reader orientation?

  Expected findings:
  - role="region" identified as MAJOR
  - aria-labelledby identified as MAJOR
  - Both findings cite specific lines
  - Pattern context provided (WAI-ARIA Accordion Pattern)
