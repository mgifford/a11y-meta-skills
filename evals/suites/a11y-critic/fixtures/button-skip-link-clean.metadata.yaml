notes: |
  This is a **CLEAN baseline** fixture for focus management and keyboard navigation.

  Expected verdict: ACCEPT

  Implementation demonstrates:
  1. Skip link present and functional (href="#main-content" jumps to main element with matching id)
  2. Skip link hidden off-screen, revealed on focus
  3. Semantic landmarks: nav, main, footer
  4. Navigation marked with aria-label
  5. List semantics for navigation
  6. Focus indicators visible on navigation links

  A11y-critic should verify all elements and acknowledge proper implementation. May note aria-current enhancement but no blocking issues.
