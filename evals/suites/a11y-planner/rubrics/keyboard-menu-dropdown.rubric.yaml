fixture_id: keyboard-menu-dropdown
rubric_version: "1.0"
scoring_method: hybrid
hybrid_weights:
  rule_based: 0.7
  llm_judge: 0.3

dimensions:
  - id: completeness
    name: "Completeness"
    weight: 3
    rule_based_checks:
      - has_all_9_phases: true

  - id: wcag_grounding
    name: "WCAG Grounding"
    weight: 3
    rule_based_checks:
      - includes_wcag_citations: true

  - id: apg_pattern
    name: "APG Pattern Mapping"
    weight: 2
    rule_based_checks:
      - maps_to_apg_menubutton: true

  - id: focus_management
    name: "Focus Management"
    weight: 2
    rule_based_checks:
      - clarifies_focus_on_open: true

  - id: keyboard_interaction
    name: "Keyboard Interaction"
    weight: 2
    rule_based_checks:
      - documents_arrow_keys: true
      - documents_escape_key: true

composite_score_formula: |
  score = sum(dimension_score × weight) / sum(weights) × 100

scoring_thresholds:
  excellent: 90-100
  good: 75-89
  adequate: 60-74
  weak: 40-59
  poor: 0-39

expected_reviewer_performance:
  - condition: a11y-planner
    expected_score: 87-98
    reasoning: "Should handle MODERATE APG Menu Button pattern with focus management"

verdict_expectations:
  a11y-planner: ACCEPT

notes: |
  MODERATE difficulty testing APG Menu Button pattern.
