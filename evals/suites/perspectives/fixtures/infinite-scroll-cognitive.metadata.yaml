fixture_id: infinite-scroll-cognitive
name: "Infinite Scroll Feed With Cognitive Navigation Breakdown"
description: >
  React infinite scroll feed with no position indicator, no 'load more' alternative, virtual scrolling that removes offscreen DOM nodes, and relative timestamps that change while reading.
language: jsx
framework: React
difficulty: ADVERSARIAL
domain: Dynamic Content
work_type: component_review

expected_findings:
  - category: must_find
    count: 2
    items:
      - description: "No position indicator, no 'back to top', no page numbers"
        severity: CRITICAL
        wcag: "2.4.8 Location / Cognitive"
        evidence: "No feed position UI; no way to know where user is in content"
        user_group: "Cognitive users, all users"
      - description: "Auto-loads content on scroll — no 'Load more' button alternative"
        severity: MAJOR
        wcag: "2.2.2 Pause, Stop, Hide / 2.1.1 Keyboard"
        evidence: "IntersectionObserver auto-fetches; no explicit load button; keyboard users trapped in infinite Tab"
        user_group: "Keyboard users, cognitive users"
  - category: should_find
    count: 1
    items:
      - description: "Virtual scrolling removes offscreen DOM nodes — user loses position on Tab backward"
        severity: MAJOR
        wcag: "2.4.3 Focus Order"
        evidence: "Previously focused elements removed from DOM; focus reset on backward navigation"
        user_group: "Keyboard users, screen reader users"
  - category: nice_to_find
    count: 2
    items:
      - description: "Relative timestamps change during reading"
        severity: MINOR
        wcag: "Cognitive best practice"
        evidence: "'2h ago' updates to '3h ago' while user reads"
        user_group: "Cognitive/attention users"
      - description: "No 'end of feed' indicator"
        severity: MINOR
        wcag: "Cognitive best practice"
        evidence: "Feed appears infinite; no empty state or end message"
        user_group: "Cognitive users"

perspectives_tested:
  primary: "cognitive_neurodivergent"
  secondary: "keyboard_motor"

expected_alarm_levels:
  magnification_reflow: LOW
  environmental_contrast: LOW
  vestibular_motion: LOW
  auditory_access: LOW
  keyboard_motor: HIGH
  screen_reader_semantic: MEDIUM
  cognitive_neurodivergent: HIGH

false_positive_traps:
  count: 3
  items:
    - description: "Each card has proper heading and image alt text"
      note: "Correct — do not flag"
    - description: "Landmark regions are present"
      note: "Correct — do not flag"
    - description: "aria-live='polite' on new content announcements"
      note: "Correct — do not flag"

expected_verdict: REVISE

notes: "Generated fixture for ADVERSARIAL category, primary perspective cognitive_neurodivergent."
