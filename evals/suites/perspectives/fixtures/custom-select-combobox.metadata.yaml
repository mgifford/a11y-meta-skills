fixture_id: custom-select-combobox
name: "Custom Select Combobox Without Keyboard Navigation"
description: >
  React custom select/combobox dropdown with search filtering. Arrow keys don't navigate options, no ARIA roles, no aria-selected, Escape doesn't close.
language: jsx
framework: React
difficulty: HAS-BUGS
domain: Interactive Widgets
work_type: component_review
regression_fixture: true
regression_note: "Tests existing-dimension strength. All conditions should score 70%+. C must not regress below A."

expected_findings:
  - category: must_find
    count: 2
    items:
      - description: "Arrow keys don't navigate options — only Tab works"
        severity: CRITICAL
        wcag: "2.1.1 Keyboard"
        evidence: "No onKeyDown handler for ArrowUp/ArrowDown"
        user_group: "Keyboard users, switch users"
      - description: "No role='combobox' or role='listbox' — div soup"
        severity: CRITICAL
        wcag: "4.1.2 Name, Role, Value"
        evidence: "Options container is plain div with no ARIA role"
        user_group: "Screen reader users"
  - category: should_find
    count: 1
    items:
      - description: "Selected option not announced — no aria-selected or activedescendant"
        severity: MAJOR
        wcag: "4.1.2 Name, Role, Value"
        evidence: "No aria-selected on options; no aria-activedescendant on input"
        user_group: "Screen reader users"
  - category: nice_to_find
    count: 2
    items:
      - description: "Escape doesn't close dropdown"
        severity: MINOR
        wcag: "APG Combobox pattern"
        evidence: "No Escape key handler in onKeyDown"
        user_group: "Keyboard users"
      - description: "No live region announces filtered count"
        severity: MINOR
        wcag: "4.1.3 Status Messages"
        evidence: "Filter changes option count visually but no aria-live"
        user_group: "Screen reader users"

perspectives_tested:
  primary: "keyboard_motor"
  secondary: "screen_reader_semantic"

expected_alarm_levels:
  magnification_reflow: LOW
  environmental_contrast: LOW
  vestibular_motion: LOW
  auditory_access: LOW
  keyboard_motor: HIGH
  screen_reader_semantic: HIGH
  cognitive_neurodivergent: LOW

false_positive_traps:
  count: 2
  items:
    - description: "Visual focus indicator exists on options"
      note: "Correct — do not flag"
    - description: "Label is associated with the input"
      note: "Correct — do not flag"

expected_verdict: REVISE

notes: "Generated fixture for HAS-BUGS category, primary perspective keyboard_motor."
