fixture_id: product-carousel-autoplay
rubric_version: "1.0"
scoring_method: hybrid
hybrid_weights:
  rule_based: 0.7
  llm_judge: 0.3

dimensions:
  - id: must_find
    name: "Must-Find Issues"
    description: "WCAG 2.2.2 pause control and prefers-reduced-motion on slide transition"
    weight: 3

  - id: should_find
    name: "Should-Find Issues"
    description: "Parallax background-attachment: fixed without reduced-motion override"
    weight: 2

  - id: nice_to_find
    name: "Nice-to-Find Issues"
    description: "Badge pulse animation cognitive impact; missing aria-live region"
    weight: 1

  - id: perspective_coverage
    name: "Perspective Coverage"
    description: >
      Review explicitly names vestibular and/or motion sensitivity as the affected user group,
      cites relevant WCAG criteria (2.2.2, 2.3.1, 2.3.3), and does not treat keyboard success
      as sufficient coverage of the component's accessibility posture.
    weight: 2

  - id: false_positive_trap
    name: "False Positive Avoidance"
    description: >
      Correctly avoids flagging keyboard navigation, button labels, alt text, or contrast
      as issues — these are intentionally correct in this fixture.
    weight: -2

  - id: evidence_quality
    name: "Evidence Quality"
    description: "CRITICAL/MAJOR findings backed by file:line reference or code quote"
    weight: 1

  - id: format_compliance
    name: "Format Compliance"
    description: "Output matches expected skill format contract (severity labels, WCAG refs, user groups)"
    weight: 1

expected_findings:
  - category: must_find
    count: 2
    items:
      - description: "No pause/stop control for auto-advancing content"
        severity: CRITICAL
        wcag: "2.2.2 Pause, Stop, Hide"
        evidence_requirement: "Reference to setInterval or absence of pause button"
        expected_to_find:
          condition_A: "55%"
          condition_B: "70%"
          condition_C: "90%"
        scoring_notes: >
          Full credit if reviewer cites WCAG 2.2.2 and frames the harm as vestibular/motion
          or cognitive/attention impact. Partial credit (0.5) if reviewer flags the auto-advance
          as a general UX concern without WCAG citation or user group framing. No credit if
          auto-advance is not mentioned.
        notes: >
          Condition A may flag this as a general UX issue but is unlikely to frame it through
          vestibular/motion harm. Condition B names the dimension but may under-weight severity.
          Condition C should produce CRITICAL with explicit vestibular user group and WCAG 2.2.2 cite.

      - description: "CSS slide transition ignores prefers-reduced-motion"
        severity: MAJOR
        wcag: "2.3.1 / 2.3.3 Animation from Interactions"
        evidence_requirement: "Reference to inline transition style or absence of @media (prefers-reduced-motion)"
        expected_to_find:
          condition_A: "25%"
          condition_B: "55%"
          condition_C: "85%"
        scoring_notes: >
          Full credit if reviewer cites prefers-reduced-motion absence on the slide transition
          AND references WCAG 2.3.1 or 2.3.3. Partial credit (0.5) if reviewer mentions
          animation concern without identifying the specific CSS property or media query.
          No credit if not mentioned.
        notes: >
          This is the key differentiator. Condition A has no structured prefers-reduced-motion
          checklist and is unlikely to raise this independently. Condition B may mention it if
          the model connects "vestibular" to "motion media query." Condition C has a JTBD checklist
          for vestibular that explicitly covers CSS transitions.

  - category: should_find
    count: 1
    items:
      - description: "Parallax background-attachment: fixed with no reduced-motion override"
        severity: MAJOR
        wcag: "2.3.3 Animation from Interactions"
        evidence_requirement: "Reference to background-attachment: fixed in CSS"
        expected_to_find:
          condition_A: "10%"
          condition_B: "35%"
          condition_C: "75%"
        notes: >
          Parallax is a vestibular-specific pattern that requires domain knowledge to flag.
          Condition A is very unlikely to catch this. Condition B may catch it if the model
          knows parallax is a motion concern. Condition C should have parallax as a checklist item.

  - category: nice_to_find
    count: 2
    items:
      - description: "Rapid badge pulse animation — cognitive/attention impact"
        severity: MINOR
        expected_to_find:
          condition_A: "20%"
          condition_B: "40%"
          condition_C: "70%"

      - description: "No aria-live region for slide changes"
        severity: MINOR
        expected_to_find:
          condition_A: "45%"
          condition_B: "50%"
          condition_C: "65%"
        notes: >
          The aria-live gap is in the screen reader dimension — all three conditions have some
          screen reader coverage, so the delta here is smaller. This is not the discriminating item.

  - category: false_positive_trap
    count: 0
    penalty_weight: 0
    known_safe_features:
      - "Prev/next button aria-label attributes"
      - "Button keyboard focusability and :focus-visible styles"
      - "Product image alt text"
      - "Color contrast on text and buttons"
      - "Decorative dot indicators marked aria-hidden"
      - "Semantic h2 on product name"

composite_score_formula: |
  score = sum(found_items * dimension_weight) / sum(all_positive_dimension_weights) * 100

  Positive dimension weights sum: must_find(3) + should_find(2) + nice_to_find(1) + perspective_coverage(2) + evidence_quality(1) + format_compliance(1) = 10

  perspective_coverage awarded when:
    - Reviewer explicitly names vestibular OR motion sensitivity as affected user group for at least one MAJOR finding
    - AND cites at least one of: WCAG 2.2.2, 2.3.1, 2.3.3
    - AND does not conclude the component is broadly accessible based solely on keyboard success

scoring_thresholds:
  excellent: 90-100
  good: 75-89
  adequate: 60-74
  weak: 40-59
  poor: 0-39

expected_reviewer_performance:
  - condition: A
    label: "Current skills (no perspectives)"
    expected_score: "35-45"
    reasoning: >
      Condition A focuses on ARIA and keyboard patterns. The prev/next buttons work; headings
      and alt text are present. A reviewer with no vestibular checklist is likely to report
      the component as mostly accessible with minor screen reader gaps. The pause/stop issue
      MAY be raised as a general UX concern but will not be framed as WCAG 2.2.2 or vestibular
      harm. The slide transition and parallax will almost certainly be missed. Perspective
      coverage dimension score: 0. Result: PASS or weak REVISE.

  - condition: B
    label: "Strong generic baseline (named dimensions)"
    expected_score: "55-65"
    reasoning: >
      Naming "vestibular" in the prompt modifier prompts the model to scan for motion issues.
      The pause/stop control will likely be found and correctly framed. The slide transition
      may be raised. Parallax is 50/50 — depends on whether the model connects background-attachment
      to vestibular harm without a structured checklist. Findings in B tend to be less specific
      (missing file:line evidence, vague fix suggestions). Perspective coverage partially awarded.
      Result: REVISE.

  - condition: C
    label: "Enhanced skills with perspective-audit"
    expected_score: "80-90"
    reasoning: >
      Condition C has a structured JTBD checklist for vestibular users that covers: auto-advancing
      content (WCAG 2.2.2), CSS transitions without prefers-reduced-motion, parallax effects, and
      rapid animations. All three must_find and should_find items should be identified with WCAG
      citations and user group framing. Badge pulse and aria-live gap likely caught as MINOR.
      Evidence quality high (inline style refs, CSS line refs). Perspective coverage dimension
      fully awarded. Result: REVISE with structured vestibular section.

key_differentiators:
  A_vs_B: >
    Condition A treats keyboard success as near-sufficient. Condition B is prompted to look further
    and will name vestibular concerns, but findings are looser. The gap between A and B measures
    what naming dimensions alone buys.
  B_vs_C: >
    The critical comparison. Both name vestibular. Condition C should additionally find the parallax
    background (checklist item), produce evidence-backed findings (file:line), and structure output
    by perspective (HIGH alarm on Vestibular, MEDIUM on Cognitive). This gap measures what the
    structured JTBD methodology contributes over a generic dimension reminder.

verdict_expectations:
  condition_A: "PASS or weak REVISE (misses vestibular frame)"
  condition_B: "REVISE (names issues but may lack specificity)"
  condition_C: "REVISE (structured vestibular findings, alarm levels set)"

notes: |
  The deliberate design of this fixture is that it PASSES a surface-level keyboard/ARIA review.
  Buttons work. Labels are present. Alt text is correct. The only way to find the real issues is
  to apply a vestibular/motion lens.

  This fixture measures whether the perspective approach changes what reviewers look for —
  not just whether they find more issues, but whether they look at the right things.

  The parallax item is the strongest B-vs-C discriminator: it requires knowing that
  background-attachment: fixed creates a parallax effect AND that parallax is a documented
  vestibular trigger — a checklist-level fact unlikely to surface from a generic prompt.
