fixture_id: podcast-audio-only
rubric_version: "1.0"
scoring_method: hybrid
hybrid_weights:
  rule_based: 0.7
  llm_judge: 0.3

dimensions:
  - id: must_find
    name: "Must-Find Issues"
    description: "Critical auditory-dimension issues a perspective-aware reviewer must identify"
    weight: 3

  - id: should_find
    name: "Should-Find Issues"
    description: "Major issues a skilled reviewer would find with auditory and secondary perspective attention"
    weight: 2

  - id: nice_to_find
    name: "Nice-to-Find Issues"
    description: "Minor issues requiring screen reader perspective depth"
    weight: 1

  - id: false_positive_trap
    name: "False Positive Avoidance"
    description: "Correctly implemented keyboard controls and label associations must NOT be flagged as bugs"
    weight: -2

  - id: evidence_quality
    name: "Evidence Quality"
    description: "CRITICAL and MAJOR findings backed by file reference or element quote"
    weight: 1

  - id: format_compliance
    name: "Format Compliance"
    description: "Output matches a11y-critic format contract (severity, wcag, user_group, fix)"
    weight: 1

  - id: perspective_coverage
    name: "Perspective Coverage"
    description: "Findings attributed to the correct access perspective (auditory primary, screen reader secondary)"
    weight: 2

expected_findings:
  must_find:
    count: 1
    items:
      - id: mf-1
        description: "No transcript for audio-only podcast content"
        severity: CRITICAL
        wcag: "1.2.1 Audio-only and Video-only (Prerecorded)"
        perspective: auditory_access
        evidence_requirement: "Reference to absent transcript section or no-transcript-notice comment"
        expected_to_find: "90%"
        scoring_notes: >
          Full credit if reviewer cites 1.2.1 and identifies the complete absence of any
          transcript section or link. Partial credit (0.5) if reviewer identifies missing
          transcript without citing WCAG. No credit if reviewer only mentions it in passing
          without identifying it as the primary CRITICAL finding.

  should_find:
    count: 2
    items:
      - id: sf-1
        description: "Episode descriptions spoken in audio intro but never rendered as text"
        severity: MAJOR
        wcag: "1.2.1 Audio-only and Video-only (Prerecorded)"
        perspective: auditory_access
        evidence_requirement: "Reference to BUG comment above episode list or absence of description field in episode items"
        expected_to_find: "65%"
        scoring_notes: >
          Full credit if reviewer identifies that episode descriptions exist only in audio
          and are not rendered as text anywhere. This is a distinct issue from mf-1 (no
          transcript) and must be cited as a separate finding for full credit.
          Condition A baseline expected to miss this; condition C should find it via
          auditory JTBD framing ("deaf user trying to choose an episode").

      - id: sf-2
        description: "New episode notification is audio chime only — no visual DOM change or aria-live"
        severity: MAJOR
        wcag: "1.4.1 Use of Color; non-text equivalent principle"
        perspective: auditory_access
        evidence_requirement: "Reference to handleNewEpisode AudioContext chime with no DOM update; new-badge role=img without aria-label"
        expected_to_find: "55%"
        scoring_notes: >
          Full credit requires identifying BOTH the audio chime (Web Audio API with no DOM
          update) AND the new-badge missing aria-label. Finding only one of the two earns
          partial credit (0.5). This is the highest-signal differentiator between A and C:
          it requires the reviewer to trace event-handler code (handleNewEpisode) as well
          as inspect the badge markup.

  nice_to_find:
    count: 1
    items:
      - id: ntf-1
        description: "Speed control does not announce active speed to screen readers on change"
        severity: MINOR
        wcag: "4.1.3 Status Messages"
        perspective: screen_reader_semantic
        evidence_requirement: "Reference to static aria-label on select and absent aria-live region in handleSpeedChange"
        expected_to_find: "45%"
        scoring_notes: >
          Full credit if reviewer correctly identifies the narrow issue: the label association
          IS correct (label htmlFor is present), but the change event produces no live
          announcement. Reviewers who flag the label association as missing are penalized
          via the false_positive_trap dimension (partial-implementation over-penalization).

  false_positive_traps:
    count: 3
    items:
      - id: fpt-1
        description: "Play/pause, skip back, skip forward, and seek controls are correctly implemented"
        penalty: -2
        trigger: "Reviewer flags any of the player control buttons or seek input as a keyboard accessibility issue"
        relevant_elements: "btn-control buttons, seek-bar input"
        scoring_notes: >
          Apply -2 weight if reviewer flags play/pause, skip buttons, or seek bar as
          keyboard accessibility failures. These use native <button> and <input type=range>
          with correct aria-label attributes. This trap tests whether the reviewer conflates
          keyboard and auditory dimensions.

      - id: fpt-2
        description: "Speed control <label htmlFor> association is correct"
        penalty: -2
        trigger: "Reviewer flags the speed control as missing a label association"
        relevant_elements: "speed-select and its label"
        scoring_notes: >
          Apply -2 weight if reviewer cites the speed control label as absent or broken.
          The <label htmlFor='speed-select'> is present and correctly associated.
          The bug is specifically the missing live announcement on change.

      - id: fpt-3
        description: "Episode buttons use aria-pressed correctly"
        penalty: -2
        trigger: "Reviewer flags episode buttons as missing selection state indication"
        relevant_elements: "Episode list button elements with aria-pressed"
        scoring_notes: >
          Apply -2 weight if reviewer cites missing selection state on episode buttons.
          All episode buttons carry aria-pressed reflecting whether the episode is active.

composite_score_formula: |
  positive_weights = (must_find * 3) + (should_find * 2) + (nice_to_find * 1) + (evidence_quality * 1) + (format_compliance * 1) + (perspective_coverage * 2)
  max_positive = (1 * 3) + (2 * 2) + (1 * 1) + (1 * 1) + (1 * 1) + (1 * 2) = 13
  false_positive_penalty = count_triggered * 2
  raw_score = sum(found * weight) - false_positive_penalty
  normalized_score = raw_score / max_positive * 100

scoring_thresholds:
  excellent: 90-100
  good: 75-89
  adequate: 60-74
  weak: 40-59
  poor: 0-39

expected_reviewer_performance:
  - condition: A
    label: "Current skills (no perspectives)"
    expected_score: 35-45
    reasoning: >
      Without auditory perspective prompting, condition A is expected to find the missing
      transcript (mf-1) as a known WCAG 1.2.1 pattern, but will likely miss the episode
      description audio-only issue (sf-1) and the audio chime notification (sf-2).
      No false positives expected on keyboard controls (those are visibly correct).

  - condition: B
    label: "Strong generic baseline (dimension names appended)"
    expected_score: 55-65
    reasoning: >
      Naming "auditory" will likely surface mf-1 and sf-1. The audio chime (sf-2) requires
      tracing handleNewEpisode code execution, which condition B may do partially.
      The speed control nuance (ntf-1) is unlikely to be found without screen reader lens.

  - condition: C
    label: "Enhanced skills with perspective-audit"
    expected_score: 80-90
    reasoning: >
      With auditory perspective protocol and JTBD framing ("deaf user choosing an episode
      without hearing the intro"), condition C should find all must-find and should-find
      items. The handleNewEpisode chime (sf-2) becomes obvious when reasoning from a
      deaf user's perspective — they receive no signal when a new episode is available.
      Perspective coverage dimension scores high if auditory vs screen reader attribution is correct.

verdict_expectations:
  A: REVISE
  B: REVISE
  C: REVISE

differentiator_findings:
  - finding_id: sf-2
    name: "Audio-chime-only new episode notification"
    rationale: >
      Requires reasoning from the auditory user's perspective (deaf user never learns
      about new episodes) rather than pattern-matching to a checklist item. Also requires
      tracing the handleNewEpisode event handler to identify the Web Audio API call.
      Condition A is expected to miss it in >75% of runs.
      Condition C is expected to find it in >55% of runs.
    metric_target: "new_dimension_recall"

  - finding_id: sf-1
    name: "Episode descriptions audio-only"
    rationale: >
      Tests whether the auditory lens extends beyond the obvious transcript gap to the
      pre-play decision-making context (choosing an episode without hearing its intro).
      A reviewer who only checks for WCAG checklist items will miss this.
    metric_target: "new_dimension_recall"

notes: |
  Fixture 1 of 4 in the expanded suite. Rubric version 1.0.

  Key measurement goals:
  1. Does condition C find sf-2 (audio chime) more reliably than A or B?
  2. Does the speed-control partial-implementation trap (fpt-2) correctly penalize
     reviewers who conflate missing-label with missing-live-announcement?
  3. Does condition C correctly distinguish auditory findings from screen reader findings
     for the perspective_coverage dimension?

  The three false positive traps are more numerous than in video-tutorial-no-captions
  because the speed control partial-implementation case adds a new trap type.
  Calibrate expected A-condition performance against the video-tutorial baseline.
